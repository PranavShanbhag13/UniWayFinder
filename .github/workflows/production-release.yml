name: UniWayFinder Production CI/CD

on:
  push:
    branches: [ "main" ]

env:
  DOCKER_ORG: ianlaijun

jobs:
  # JOB 1: MATRIX BUILD (矩阵并行构建所有微服务)
  build-backends:
    name: Build & Push Spring Boot Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # all the microservice folder name
        service: [api-gateway, identity-service, notification-service, timetable-service, clss-location-service, engagement-service]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven Build JAR (${{ matrix.service }})
        run: |
          cd ${{ matrix.service }}
          mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ env.DOCKER_ORG }}/uniwayfinder-${{ matrix.service }}:latest

