server:
  port: 8080 # The Gateway will run on port 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # Global CORS Configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000" # React frontend default port
              - "http://localhost:5173" # Vite React default port
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      # Routing Rules
      routes:
        # Route for Identity Service
        - id: identity-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        # Route for Notification Service
        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/notify/**

# Enable Gateway logging to see routing in action
logging:
  level:
    org.springframework.cloud.gateway: TRACE